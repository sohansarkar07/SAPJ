<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Second Brain — Knowledge Synthesizer</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-background": "#1c1b23",
            "tertiary": "#743300",
            "on-tertiary-fixed-variant": "#763300",
            "on-primary": "#ffffff",
            "on-tertiary-fixed": "#321200",
            "on-secondary-fixed-variant": "#3c4663",
            "on-tertiary": "#ffffff",
            "on-surface-variant": "#474554",
            "inverse-primary": "#c6bfff",
            "tertiary-fixed-dim": "#ffb68d",
            "surface-container-lowest": "#ffffff",
            "on-error": "#ffffff",
            "surface": "#fcf8ff",
            "on-primary-fixed": "#150066",
            "surface-container": "#f0ecf8",
            "surface-container-highest": "#e5e0ed",
            "secondary-fixed-dim": "#bcc5e9",
            "primary-fixed-dim": "#c6bfff",
            "error-container": "#ffdad6",
            "secondary": "#545e7c",
            "on-primary-container": "#d7d2ff",
            "surface-tint": "#5746d5",
            "secondary-container": "#cfd9fd",
            "on-secondary-container": "#545e7d",
            "primary-container": "#5645d4",
            "tertiary-fixed": "#ffdbc9",
            "inverse-on-surface": "#f3effb",
            "surface-container-high": "#ebe6f2",
            "outline": "#787586",
            "background": "#fcf8ff",
            "on-surface": "#1c1b23",
            "inverse-surface": "#312f38",
            "primary": "#3d27bc",
            "surface-bright": "#fcf8ff",
            "secondary-fixed": "#dae2ff",
            "on-secondary": "#ffffff",
            "on-tertiary-container": "#ffcdb1",
            "on-primary-fixed-variant": "#3e28bd",
            "surface-dim": "#dcd8e4",
            "surface-variant": "#e5e0ed",
            "on-secondary-fixed": "#101a36",
            "tertiary-container": "#994500",
            "outline-variant": "#c8c4d7",
            "surface-container-low": "#f6f2fe",
            "error": "#ba1a1a",
            "on-error-container": "#93000a",
            "primary-fixed": "#e4dfff"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "xs": "8px",
            "hero": "120px",
            "md": "16px",
            "lg": "20px",
            "section": "64px",
            "xl": "24px",
            "sm": "12px",
            "xxl": "32px"
          },
          "fontFamily": {
            "hero": ["Inter"],
            "h1": ["Inter"],
            "button": ["Inter"],
            "h2": ["Inter"],
            "h3": ["Inter"],
            "body": ["Inter"]
          },
          "fontSize": {
            "hero": ["64px", { "lineHeight": "1.1", "letterSpacing": "-2px", "fontWeight": "700" }],
            "h1": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.5px", "fontWeight": "600" }],
            "button": ["14px", { "lineHeight": "1", "letterSpacing": "0px", "fontWeight": "500" }],
            "h2": ["36px", { "lineHeight": "1.3", "letterSpacing": "-0.5px", "fontWeight": "600" }],
            "h3": ["24px", { "lineHeight": "1.4", "letterSpacing": "0px", "fontWeight": "600" }],
            "body": ["16px", { "lineHeight": "1.6", "letterSpacing": "0px", "fontWeight": "400" }]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .fill-icon {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body>
  <script src="app.js"></script>
</body>
</html>
